AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ConceptForgeAI - Production-Ready AI Idea Validation Platform'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name
  
  DomainName:
    Type: String
    Default: ''
    Description: Custom domain name (optional)
    
  CertificateArn:
    Type: String
    Default: ''
    Description: SSL Certificate ARN for custom domain (optional)

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        NODE_ENV: production
    Tags:
      Environment: !Ref Environment
      Application: ConceptForgeAI

Resources:
  # DynamoDB Table for storing validation reports
  ValidationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'conceptforge-validations-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ConceptForgeAI

  # Analytics Table for usage tracking
  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'conceptforge-analytics-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: metricType
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: metricType
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ConceptForgeAI

  # Lambda function for idea validation
  ValidateIdeaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'conceptforge-validate-${Environment}'
      CodeUri: lambda/
      Handler: validate-idea.handler
      MemorySize: 512
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref ValidationTable
          ANALYTICS_TABLE: !Ref AnalyticsTable
          BEDROCK_REGION: !Ref AWS::Region
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ValidationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: 
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0'
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
      Events:
        ValidateApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /validate
            Method: post
        OptionsApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /validate
            Method: options

  # Lambda function for research integration (Phase 2)
  ResearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'conceptforge-research-${Environment}'
      CodeUri: lambda/
      Handler: research-integration.handler
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref ValidationTable
          ANALYTICS_TABLE: !Ref AnalyticsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ValidationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/conceptforge/*'
      Events:
        ResearchApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /research
            Method: post

  # API Gateway with enhanced configuration
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'conceptforge-api-${Environment}'
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'POST, GET, OPTIONS'"
        AllowHeaders: "'Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token, X-User-Id'"
        AllowOrigin: "'*'"
      ThrottleConfig:
        RateLimit: 100
        BurstLimit: 200
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      Tags:
        Environment: !Ref Environment
        Application: ConceptForgeAI

  # S3 Bucket for hosting static website
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'conceptforge-website-${Environment}-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ConceptForgeAI

  # S3 Bucket Policy for public read access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket}/*'

  # CloudFront Distribution for global CDN
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ConceptForgeAI

  # Parameter Store for API keys (Phase 2)
  PubMedApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/conceptforge/${Environment}/pubmed-api-key'
      Type: SecureString
      Value: 'placeholder-key'
      Description: 'PubMed API Key for research integration'

  SemanticScholarApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/conceptforge/${Environment}/semantic-scholar-api-key'
      Type: SecureString
      Value: 'placeholder-key'
      Description: 'Semantic Scholar API Key for research integration'

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'ConceptForgeAI-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${ValidateIdeaFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${ValidationTable}" ],
                  [ ".", "ConsumedWriteCapacityUnits", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "DynamoDB Metrics"
              }
            }
          ]
        }

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  WebsiteURL:
    Description: 'Website URL'
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'

  CloudFrontURL:
    Description: 'CloudFront Distribution URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontURL'

  DynamoDBTable:
    Description: 'DynamoDB table name'
    Value: !Ref ValidationTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTable'

  AnalyticsTable:
    Description: 'Analytics table name'
    Value: !Ref AnalyticsTable
    Export:
      Name: !Sub '${AWS::StackName}-AnalyticsTable'