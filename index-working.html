<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConceptForgeAI - AI Idea Validation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="brand">
                <i class="fas fa-brain brand-icon"></i>
                <span class="brand-text">ConceptForge<span class="brand-ai">AI</span></span>
            </div>
            <p class="tagline">AI-Powered Idea Validation Platform</p>
        </header>

        <main class="main-content">
            <section class="input-section glass-card">
                <h2><i class="fas fa-lightbulb"></i> Describe Your Concept</h2>
                <textarea 
                    id="ideaInput" 
                    placeholder="Enter your startup idea, research concept, or innovation here. Be specific about the problem you're solving, your target audience, and your proposed solution..."
                    maxlength="2000"
                ></textarea>
                <div class="input-footer">
                    <span class="char-counter">
                        <span id="charCount">0</span> / 2000 characters
                    </span>
                    <button id="validateBtn" class="btn-primary">
                        <i class="fas fa-rocket"></i>
                        <span class="btn-text">Forge Analysis</span>
                        <span class="btn-loading" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Analyzing...
                        </span>
                    </button>
                </div>
            </section>

            <section id="resultsSection" class="results-section" style="display: none;">
                <div class="glass-card">
                    <h2><i class="fas fa-chart-line"></i> Validation Results</h2>
                    
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-icon"><i class="fas fa-star"></i></div>
                            <div class="metric-value" id="uniquenessScore">0</div>
                            <div class="metric-label">Uniqueness Score</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon"><i class="fas fa-dollar-sign"></i></div>
                            <div class="metric-value" id="commercialScore">0</div>
                            <div class="metric-label">Commercial Readiness</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon"><i class="fas fa-exclamation-triangle"></i></div>
                            <div class="metric-value" id="riskLevel">Low</div>
                            <div class="metric-label">Risk Level</div>
                        </div>
                    </div>

                    <div class="insights-grid">
                        <div class="insight-card">
                            <h3><i class="fas fa-industry"></i> Target Industries</h3>
                            <ul id="targetIndustries"></ul>
                        </div>
                        <div class="insight-card">
                            <h3><i class="fas fa-exclamation-circle"></i> Key Risks</h3>
                            <ul id="keyRisks"></ul>
                        </div>
                        <div class="insight-card">
                            <h3><i class="fas fa-lightbulb"></i> Recommendations</h3>
                            <ul id="improvements"></ul>
                        </div>
                        <div class="insight-card">
                            <h3><i class="fas fa-book"></i> Related Research</h3>
                            <ul id="relatedPapers"></ul>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        const CONFIG = {
            API_ENDPOINT: 'https://fsnpltvv61.execute-api.us-east-1.amazonaws.com/prod/validate',
            USE_MOCK_DATA: false,
            MAX_IDEA_LENGTH: 2000,
            MIN_IDEA_LENGTH: 10
        };

        class SimpleConceptForge {
            constructor() {
                this.ideaInput = document.getElementById('ideaInput');
                this.validateBtn = document.getElementById('validateBtn');
                this.charCount = document.getElementById('charCount');
                this.resultsSection = document.getElementById('resultsSection');
                this.btnText = this.validateBtn.querySelector('.btn-text');
                this.btnLoading = this.validateBtn.querySelector('.btn-loading');
                
                this.bindEvents();
            }

            bindEvents() {
                this.validateBtn.addEventListener('click', () => this.validateIdea());
                this.ideaInput.addEventListener('input', () => this.updateCharCounter());
            }

            updateCharCounter() {
                const length = this.ideaInput.value.length;
                this.charCount.textContent = length;
            }

            async validateIdea() {
                const idea = this.ideaInput.value.trim();
                
                if (!idea) {
                    this.showNotification('Please enter your concept first!', 'warning');
                    return;
                }
                
                if (idea.length < CONFIG.MIN_IDEA_LENGTH) {
                    this.showNotification(`Please provide more detail (at least ${CONFIG.MIN_IDEA_LENGTH} characters)`, 'warning');
                    return;
                }

                this.setLoadingState(true);
                
                try {
                    const response = await fetch(CONFIG.API_ENDPOINT, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ idea: idea })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    this.displayResults(result);
                    this.showNotification('Validation completed successfully!', 'success');
                } catch (error) {
                    console.error('Validation error:', error);
                    this.showNotification('Error: ' + error.message, 'error');
                } finally {
                    this.setLoadingState(false);
                }
            }

            displayResults(result) {
                // Animate scores
                this.animateScore('uniquenessScore', result.uniquenessScore);
                this.animateScore('commercialScore', result.commercialScore);
                
                // Update risk level
                document.getElementById('riskLevel').textContent = result.riskLevel;
                
                // Update lists
                this.updateList('targetIndustries', result.targetIndustries);
                this.updateList('keyRisks', result.keyRisks);
                this.updateList('improvements', result.improvements);
                this.updateList('relatedPapers', result.relatedPapers);
                
                // Show results
                this.resultsSection.style.display = 'block';
                setTimeout(() => {
                    this.resultsSection.scrollIntoView({ behavior: 'smooth' });
                }, 300);
            }

            animateScore(elementId, targetScore) {
                const element = document.getElementById(elementId);
                let currentScore = 0;
                const increment = targetScore / 50;
                
                const animation = setInterval(() => {
                    currentScore += increment;
                    if (currentScore >= targetScore) {
                        currentScore = targetScore;
                        clearInterval(animation);
                    }
                    element.textContent = Math.round(currentScore);
                }, 30);
            }

            updateList(elementId, items) {
                const element = document.getElementById(elementId);
                element.innerHTML = '';
                
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    element.appendChild(li);
                });
            }

            setLoadingState(isLoading) {
                this.validateBtn.disabled = isLoading;
                if (isLoading) {
                    this.btnText.style.display = 'none';
                    this.btnLoading.style.display = 'inline-flex';
                } else {
                    this.btnText.style.display = 'inline';
                    this.btnLoading.style.display = 'none';
                }
            }

            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification notification-${type}`;
                notification.style.display = 'block';
                
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 3000);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleConceptForge();
        });
    </script>
</body>
</html>
