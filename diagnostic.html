<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConceptForgeAI - Diagnostic</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        .status { margin: 10px 0; padding: 10px; background: rgba(0,255,0,0.1); border-left: 3px solid #00ff00; }
        .error { border-left-color: #ff0000; color: #ff0000; background: rgba(255,0,0,0.1); }
        .success { border-left-color: #00ff00; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
        button:hover { background: #00cc00; }
        pre { background: rgba(255,255,255,0.05); padding: 10px; overflow-x: auto; }
        h1 { color: #00d4ff; }
        h2 { color: #8b5cf6; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔧 ConceptForgeAI Diagnostic Tool</h1>
    
    <h2>1. Configuration Check</h2>
    <div id="configCheck"></div>
    
    <h2>2. Script Loading Check</h2>
    <div id="scriptCheck"></div>
    
    <h2>3. API Test</h2>
    <button onclick="testAPI()">Test API Endpoint</button>
    <div id="apiTest"></div>
    
    <h2>4. Console Logs</h2>
    <pre id="consoleLogs"></pre>

    <script src="config.js"></script>
    <script>
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            logs.push(['LOG', ...args]);
            originalLog.apply(console, args);
            updateLogs();
        };
        
        console.error = function(...args) {
            logs.push(['ERROR', ...args]);
            originalError.apply(console, args);
            updateLogs();
        };
        
        function updateLogs() {
            document.getElementById('consoleLogs').textContent = logs.map(l => 
                `[${l[0]}] ${l.slice(1).join(' ')}`
            ).join('\n');
        }
        
        // Check configuration
        function checkConfig() {
            const div = document.getElementById('configCheck');
            if (typeof CONFIG === 'undefined') {
                div.innerHTML = '<div class="status error">❌ CONFIG not loaded</div>';
                return;
            }
            
            div.innerHTML = `
                <div class="status success">✅ CONFIG loaded</div>
                <pre>${JSON.stringify(CONFIG, null, 2)}</pre>
            `;
        }
        
        // Check scripts
        function checkScripts() {
            const div = document.getElementById('scriptCheck');
            const checks = [
                { name: 'CONFIG', obj: typeof CONFIG !== 'undefined' },
                { name: 'DataManager', obj: typeof DataManager !== 'undefined' },
                { name: 'ResearchDatabase', obj: typeof ResearchDatabase !== 'undefined' },
                { name: 'ConceptForgeAI', obj: typeof ConceptForgeAI !== 'undefined' }
            ];
            
            div.innerHTML = checks.map(c => 
                `<div class="status ${c.obj ? 'success' : 'error'}">
                    ${c.obj ? '✅' : '❌'} ${c.name}
                </div>`
            ).join('');
        }
        
        // Test API
        async function testAPI() {
            const div = document.getElementById('apiTest');
            div.innerHTML = '<div class="status">⏳ Testing API...</div>';
            
            try {
                const response = await fetch(CONFIG.API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea: 'Test idea for diagnostic' })
                });
                
                const data = await response.json();
                
                div.innerHTML = `
                    <div class="status success">✅ API Working!</div>
                    <div class="status">Status: ${response.status}</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                div.innerHTML = `
                    <div class="status error">❌ API Error</div>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        // Run checks on load
        window.addEventListener('load', () => {
            checkConfig();
            
            // Load other scripts
            const scripts = ['data-manager.js', 'script.js'];
            let loaded = 0;
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    loaded++;
                    if (loaded === scripts.length) {
                        setTimeout(checkScripts, 500);
                    }
                };
                script.onerror = () => {
                    console.error(`Failed to load ${src}`);
                    loaded++;
                    if (loaded === scripts.length) {
                        setTimeout(checkScripts, 500);
                    }
                };
                document.body.appendChild(script);
            });
        });
    </script>
</body>
</html>
